<!DOCTYPE html>
<html>
<head>
    <title>{{ product_name }} - Categories</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f8f9fa;
            margin: 0;
            padding: 0;
        }

        header {
            background: #28a745;
            color: #fff;
            padding: 20px;
            text-align: center;
        }

        h1 { margin: 0; }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            padding: 20px;
            gap: 20px;
        }

        .card {
            background: #fff;
            border-radius: 10px;
            width: 220px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
            padding: 10px;
            transition: transform 0.2s;
        }

        .card:hover { transform: scale(1.05); }

        .card img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
        }

        .card h3 { margin: 10px 0 5px 0; }
        .card p { margin: 5px 0; font-weight: bold; color: #28a745; }

        .btn-select {
            display: inline-block;
            margin: 10px 0;
            padding: 8px 15px;
            background: #ffc107;
            color: #000;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }

        a.btn-back {
            display: inline-block;
            margin: 20px;
            padding: 8px 15px;
            background: #6c757d;
            color: #fff;
            text-decoration: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>
    <header>
        <h1>{{ product_name }} Categories</h1>
    </header>

    <div class="container">
        {% for item in subcategories %}
        <div class="card">
            <img src="{{ url_for('static', filename='images/' + item.image) }}" alt="{{ item.name }}">
            <h3>{{ item.name }}</h3>
            <p>₹{{ item.price }}</p>
            <a class="btn-select" href="{{ url_for('order_form', product=product_name, subcategory=item.name) }}">Select</a>
        </div>
        {% endfor %}
    </div>

    <div style="text-align:center;">
        <a class="btn-back" href="/">⬅ Back to Home</a>
    </div>
</body>
</html>
